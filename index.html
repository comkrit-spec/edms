<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EDMS Enterprise</title>
  
  <link id="favicon" rel="icon" href="https://img.icons8.com/color/48/document--v1.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { 
        extend: { 
          fontFamily: { sans: ['"Plus Jakarta Sans"', '"Sarabun"', 'sans-serif'] }, 
          colors: { 
             brand: { 50:'#f0f9ff', 100:'#e0f2fe', 500:'#0ea5e9', 600:'#0284c7', 700:'#0369a1', 800:'#075985', 900:'#0c4a6e' },
             slate: { 850: '#0f172a' } 
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'slide-up': 'slideUp 0.3s ease-out forwards',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
          }
        }
      }
    }
  </script>
  <style>
    /* CSS Styles เดิมทั้งหมด [cite: 130-167] */
    body { background-color: #f8fafc; background-image: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(241, 245, 249, 1) 0px, transparent 50%); background-attachment: fixed; background-size: 100% 100%; color: #334155; font-family: 'Sarabun', 'Plus Jakarta Sans', sans-serif; font-size: 14px; overflow-x: hidden; min-height: 100vh; }
    html.dark body { background-color: #0f172a; background-image: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(15, 23, 42, 1) 0px, transparent 50%); color: #cbd5e1; }
    [v-cloak] { display: none !important; }
    .main-layout { display: flex; flex-direction: column; height: 100vh; backdrop-filter: none; }
    .content-scroll { flex: 1; overflow-y: auto; scroll-behavior: smooth; padding-bottom: 60px; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .glass-card { background: #ffffff; border-radius: 12px; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; transition: transform 0.2s, box-shadow 0.2s; }
    html.dark .glass-card { background: #1e293b; border-color: #334155; box-shadow: none; }
    .input-compact { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 0 10px; font-size: 13px; height: 36px; background: #fff; display: flex; align-items: center; color: #334155; }
    html.dark .input-compact { background: #1e293b; border-color: #475569; color: #f1f5f9; }
    .input-compact:focus-within { border-color: #0ea5e9; }
    .input-plain { outline: none; background: transparent; width: 100%; height: 100%; color: inherit; }
    .label-xs { display: block; font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 4px; }
    html.dark .label-xs { color: #94a3b8; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
    .settings-nav-item { padding: 10px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: #64748b; display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
    .settings-nav-item:hover { background: #f1f5f9; color: #334155; }
    html.dark .settings-nav-item { color: #94a3b8; }
    html.dark .settings-nav-item:hover { background: #334155; color: #f8fafc; }
    .settings-nav-item.active { background: #e0f2fe; color: #0284c7; font-weight: 600; }
    html.dark .settings-nav-item.active { background: #0c4a6e; color: #38bdf8; }
    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .cb-style { accent-color: #0ea5e9; width: 16px; height: 16px; cursor: pointer; }
    .custom-select-trigger { cursor: pointer; justify-content: space-between; position: relative; }
    .custom-dropdown-menu { position: absolute; top: 100%; left: 0; width: 100%; max-height: 240px; overflow-y: auto; background: white; border: 1px solid #e2e8f0; border-radius: 8px; z-index: 50; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); margin-top: 4px; padding: 6px; color: #475569; }
    html.dark .custom-dropdown-menu { background: #1e293b; border-color: #334155; color: #cbd5e1; }
    .dropdown-item { padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; border-radius: 6px; font-size: 13px; transition: background 0.1s; }
    .dropdown-item:hover { background-color: #f1f5f9; color: #0ea5e9; }
    html.dark .dropdown-item:hover { background-color: #334155; color: #818cf8; }
    @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 99999; background: white; display: flex !important; flex-direction: column; align-items: center; } #print-area img, #print-area canvas { max-width: 100%; height: auto; margin-bottom: 20px; page-break-after: always; } ::-webkit-scrollbar { display: none; } }
  </style>
</head>
<body>

<div id="app" v-cloak class="main-layout transition-colors duration-300" @click="closeAllDropdowns">

  <div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 pointer-events-none w-full max-w-sm">
      <transition-group name="toast">
          <div v-for="n in notifications" :key="n.id" class="pointer-events-auto bg-white dark:bg-slate-800 border-l-4 rounded-lg shadow-xl p-4 flex items-start gap-3 backdrop-blur-md bg-opacity-95 border-opacity-100 relative overflow-hidden" :class="{'border-emerald-500': n.type==='success', 'border-amber-500': n.type==='warning', 'border-red-500': n.type==='error', 'border-blue-500': n.type==='info'}">
              <div class="shrink-0 pt-0.5"><i v-if="n.type==='success'" class="fa-solid fa-circle-check text-emerald-500 text-lg"></i><i v-else-if="n.type==='warning'" class="fa-solid fa-triangle-exclamation text-amber-500 text-lg"></i><i v-else-if="n.type==='error'" class="fa-solid fa-circle-xmark text-red-500 text-lg"></i><i v-else class="fa-solid fa-circle-info text-blue-500 text-lg"></i></div>
              <div class="flex-1 min-w-0"><h4 class="font-bold text-sm text-slate-800 dark:text-white leading-tight">{{ n.title }}</h4><p v-if="n.msg" class="text-xs text-slate-500 dark:text-slate-400 mt-1 leading-snug">{{ n.msg }}</p></div>
              <button @click="removeNotification(n.id)" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition"><i class="fa-solid fa-xmark"></i></button>
          </div>
      </transition-group>
  </div>

  <div v-if="loading" class="fixed inset-0 z-[999] bg-white/90 dark:bg-slate-900/90 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-500">
      <div class="relative"><div class="w-16 h-16 border-4 border-slate-200 dark:border-slate-700 border-t-brand-600 rounded-full animate-spin"></div><div class="absolute inset-0 flex items-center justify-center"><i class="fa-solid fa-cube text-brand-600 text-xl animate-pulse"></i></div></div>
      <p class="mt-4 text-xs font-bold text-slate-500 uppercase tracking-widest animate-pulse">Loading System...</p>
  </div>

  <div v-if="!isLoggedIn" key="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center overflow-hidden">
      <div class="absolute inset-0 w-full h-full"><div v-if="settings.loginBgUrl" class="absolute inset-0 bg-cover bg-center" :style="{backgroundImage: 'url(' + getSafeImgUrl(settings.loginBgUrl) + ')'}"></div><div class="absolute inset-0 bg-gradient-to-br from-slate-900/40 to-brand-900/40 backdrop-blur-sm"></div></div>
      <div class="glass-card w-full max-w-sm p-10 shadow-2xl relative z-10 bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl border border-white/40 dark:border-slate-700 animate-slide-up">
          <div class="text-center mb-8"><div class="mb-4 flex justify-center h-14"><img v-if="settings.logoUrl" :src="getSafeImgUrl(settings.logoUrl)" class="h-full object-contain drop-shadow-lg transition duration-500"><div v-else class="w-14 h-14 bg-gradient-to-br from-brand-500 to-brand-700 rounded-2xl flex items-center justify-center text-white text-2xl shadow-xl shadow-brand-500/30"><i class="fa-solid fa-cube"></i></div></div><h2 class="text-2xl font-bold text-slate-800 dark:text-white tracking-tight">System Login</h2></div>
          <form @submit.prevent="handleLogin" class="space-y-5">
            <div><label class="label-xs">Username</label><div class="input-compact"><i class="fa-solid fa-user text-slate-400 mr-2"></i><input v-model="loginForm.username" class="input-plain" placeholder="admin" required></div></div>
            <div>
              <label class="label-xs">Password</label>
              <div class="input-compact relative"><i class="fa-solid fa-lock text-slate-400 mr-2"></i><input v-model="loginForm.password" :type="showPassword ? 'text' : 'password'" class="input-plain pr-8" placeholder="••••••••" required><button type="button" @click="showPassword = !showPassword" class="absolute right-3 text-slate-400 hover:text-brand-600 focus:outline-none"><i :class="['fa-solid', showPassword ? 'fa-eye-slash' : 'fa-eye']"></i></button></div>
            </div>
            <button type="submit" :disabled="loginLoading" class="w-full bg-gradient-to-r from-brand-600 to-brand-500 text-white h-11 rounded-lg font-bold hover:shadow-lg hover:shadow-brand-500/30 hover:-translate-y-0.5 transition active:scale-95 text-sm">{{ loginLoading?'Authenticating...':'Sign In' }}</button>
         </form>
      </div>
  </div>

  <div v-else :key="componentKey" class="flex flex-col h-full">
    <header class="bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl shadow-sm z-50 border-b border-slate-200 dark:border-slate-700 h-16 shrink-0 px-6 flex items-center justify-between sticky top-0 transition-colors duration-300">
       <div class="flex items-center gap-4 overflow-hidden min-w-0" @click="currentPage !== 0 ? changePage(0) : null" :class="currentPage !== 0 ? 'cursor-pointer hover:opacity-80 transition' : 'cursor-default'">
         <img v-if="settings.logoUrl" :src="getSafeImgUrl(settings.logoUrl)" :style="{height: settings.logoHeight+'px'}" class="object-contain max-h-9 shrink-0">
         <div v-else class="h-9 w-9 bg-brand-600 rounded-lg flex items-center justify-center text-white text-sm shadow-md shrink-0"><i class="fa-solid fa-cube"></i></div>
          <h1 class="font-bold text-base md:text-lg text-slate-800 dark:text-white truncate min-w-0 tracking-tight">{{ settings.companyName }}</h1>
      </div>
      <div class="flex items-center gap-4 shrink-0 ml-4">
           <nav class="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg border border-slate-200/60 dark:border-slate-700 overflow-x-auto max-w-[200px] md:max-w-none no-scrollbar">
           <template v-for="(p, i) in pages" :key="i"><button v-show="checkPermission(p.req)" @click="changePage(i)" :class="['px-4 py-1.5 rounded-md text-xs font-bold transition flex items-center gap-2 whitespace-nowrap', currentPage===i?'bg-white dark:bg-slate-700 text-brand-600 dark:text-brand-400 shadow-sm ring-1 ring-black/5':'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-200/50']"><i :class="['fa-solid', p.icon]"></i> <span class="hidden md:inline">{{ p.name }}</span></button></template>
          </nav>
         <div class="h-6 w-px bg-slate-300 dark:bg-slate-600 hidden md:block"></div>
         <div class="flex items-center gap-3">
            <button @click="loadData" class="w-9 h-9 rounded-lg bg-slate-50 dark:bg-slate-700 text-slate-500 hover:text-brand-600 border border-slate-200 dark:border-slate-600 flex items-center justify-center text-sm transition hover:shadow-md hover:-translate-y-0.5 active:scale-95" title="Refresh"><i :class="['fa-solid fa-arrows-rotate', loading ? 'animate-spin' : '']"></i></button>
            <button @click="toggleTheme" class="w-9 h-9 rounded-lg bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-yellow-400 hover:text-brand-600 border border-slate-200 dark:border-slate-600 flex items-center justify-center text-sm transition hover:shadow-md hover:-translate-y-0.5 active:scale-95"><i :class="['fa-solid', isDark ? 'fa-sun' : 'fa-moon']"></i></button>
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-brand-100 to-brand-50 border border-brand-200 flex items-center justify-center text-brand-700 font-bold text-sm shadow-sm ring-2 ring-white dark:ring-slate-800 cursor-default" :title="currentUser.name">{{ currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'U' }}</div>
            <button @click="logout" class="w-9 h-9 rounded-lg bg-white dark:bg-slate-700 text-slate-400 hover:text-red-500 border border-slate-200 dark:border-slate-600 flex items-center justify-center text-sm transition hover:bg-red-50 hover:shadow-md active:scale-95"><i class="fa-solid fa-power-off"></i></button>
         </div>
      </div>
    </header>

    <main class="content-scroll p-6">
      <div class="max-w-7xl mx-auto w-full min-h-full flex flex-col"> 
        <div class="p-8 text-center text-slate-500">
           </div>
      </div>
    </main>
  </div>
</div>
<script>
// ⚠️ สำคัญมาก: เปลี่ยนตรงนี้ให้เป็น Web App URL ที่คุณได้จาก Google Apps Script ⚠️
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyosr6zPDvnZv-RiV6vZ2nxttAopuDAOuMnG_qB6_g9odldMQWuL6ZrKJg_I0W3QhCLHg/exec"; 

const apiCall = async (action, data = null) => {
    try {
        const response = await fetch(GAS_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify({ action: action, data: data })
        });
        const result = await response.json();
        if(!result) throw new Error("Empty response from server");
        return result;
    } catch (error) {
        console.error("API Error:", error);
        throw error;
    }
};

const apiCallGet = async (action) => {
    try {
        const response = await fetch(`${GAS_API_URL}?action=${action}`);
        const result = await response.json();
        return result;
    } catch (error) {
        console.error("API Error:", error);
        throw error;
    }
};

// 🔴 โค้ดนี้อยู่ใต้ </div> ของ id="app" และต่อจาก Library Vue แล้ว จึงใช้คำสั่งนี้ได้ 🔴
const { createApp, ref, computed, onMounted, reactive, watch, nextTick, onUnmounted } = Vue;

createApp({
  setup() {
    const componentKey = ref(0);
    const isLoggedIn=ref(false), currentUser=ref({}), loginForm=reactive({}), loginLoading=ref(false);
    const loading=ref(true), currentPage=ref(0), documents=ref([]), employees=ref([]), departments=ref([]), docTypes=ref([]), usersList=ref([]);
    const settings=ref({}), showModal=ref(false), showUserModal=ref(false), showImportModal=ref(false);
    
    const showExportModal = ref(false);
    const exportConfig = reactive({
        scope: 'filtered', format: 'standard', 
        columns: {
            empId: { label: 'รหัสพนักงาน', selected: true }, nationalId: { label: 'เลขบัตร ปชช.', selected: true }, name: { label: 'ชื่อ-สกุล', selected: true }, dept: { label: 'แผนก', selected: true }, docType: { label: 'ประเภทเอกสาร', selected: true }, startDate: { label: 'วันเริ่มสัญญา', selected: false }, expDate: { label: 'วันหมดอายุ', selected: true }, daysLeft: { label: 'จำนวนวันคงเหลือ', selected: true }, status: { label: 'สถานะ', selected: true }, remark: { label: 'หมายเหตุ', selected: false }
        }
    });
    const form=reactive({}), userForm=reactive({role:'User'}), logs=ref([]);
    const searchQuery=ref(''), searchTags=ref([]);
    const selectedDepts=ref([]), selectedStatuses=ref([]), selectedDocTypes=ref([]);
    const filterStartDate=ref(''), filterEndDate=ref('');
    const previewUrl=ref(null), isPreviewPdf=ref(false);
    const isUserEdit = ref(false), activeActionMenu = ref(null), activeFilterDropdown = ref(null);
    const activeSetting = ref('branding');
    const newItemInput = ref('');
    const showSuggestions = ref(true);
    const showFilters = ref(true);
    const showResigned = ref(false);
    const isDark = ref(false);
    const collapsedCards = ref(new Set());
    const isDragging = ref(false);
    const notifications = ref([]);
    const dashboardFilter = ref(null);
    const showPassword = ref(false);
    let notificationId = 0;
    const uploadQueue = ref([]);
    const isQueueExpanded = ref(true);
    const isProcessingQueue = ref(false);
    const showEmpDropdown = ref(false);
    const customDuration = ref(1);
    const customUnit = ref('month');
    const startDateText = ref('');
    const expDateText = ref('');
    const fileUploadInput = ref(null);

    const getSafeImgUrl = (url) => { if (!url) return ''; const match = url.match(/[-\w]{25,}/); if (url.includes('drive.google.com') && match) { return 'https://drive.google.com/thumbnail?id=' + match[0] + '&sz=w1920-h1080'; } return url; };
    const sortThaiEng = (arr) => { return arr.sort((a, b) => { const strA = String(a).trim(); const strB = String(b).trim(); const isEngA = /^[a-zA-Z]/.test(strA); const isEngB = /^[a-zA-Z]/.test(strB); if (isEngA && !isEngB) return -1; if (!isEngA && isEngB) return 1; return strA.localeCompare(strB, 'th-TH'); }); };

    let lastUsedDuration = null;
    let lastActivityTime = Date.now();
    let sessionCheckInterval = null;
    const updateActivityTime = () => { lastActivityTime = Date.now(); };
    const initSessionTracker = () => {
        window.addEventListener('mousemove', updateActivityTime); window.addEventListener('keydown', updateActivityTime); window.addEventListener('click', updateActivityTime); window.addEventListener('touchstart', updateActivityTime);
        sessionCheckInterval = setInterval(() => {
            if(isLoggedIn.value) {
                const timeoutMins = parseInt(settings.value.sessionTimeout) || 30; 
                if(Date.now() - lastActivityTime > timeoutMins * 60000) {
                    isLoggedIn.value = false; localStorage.removeItem('edms_user_ent'); currentPage.value = 0;
                    Swal.fire({ title: 'หมดเวลาการเชื่อมต่อ', text: 'คุณไม่ได้ใช้งานระบบเป็นระยะเวลานาน', icon: 'warning', confirmButtonText: 'เข้าสู่ระบบใหม่', confirmButtonColor: '#0ea5e9', background: isDark.value ? '#1e293b' : '#fff', color: isDark.value ? '#cbd5e1' : '#334155' });
                }
            }
        }, 30000); 
    };
    const showToast = (type, title, msg = '') => { const id = notificationId++; notifications.value.push({ id, type, title, msg }); setTimeout(() => removeNotification(id), 3000); };
    const removeNotification = (id) => { notifications.value = notifications.value.filter(n => n.id !== id); };
    const toggleTheme = () => { isDark.value = !isDark.value; if(isDark.value) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); localStorage.setItem('edms_theme', isDark.value ? 'dark' : 'light'); };
    
    const currentTime = ref(''), currentDate = ref('');
    const updateTime = () => { const now = new Date(); currentTime.value = now.toLocaleTimeString('th-TH', {hour12:false}); currentDate.value = formatDate(now, false); };
    let timeInterval;
    let chartInstance2 = null, chartInstanceForecast = null;
    const pages = [ {index:0, name:'Dashboard', icon:'fa-chart-pie text-violet-500', req:'all'}, {index:1, name:'Search', icon:'fa-magnifying-glass text-sky-500', req:'all'}, {index:2, name:'Manage', icon:'fa-folder-tree text-emerald-500', req:'manage'}, {index:3, name:'Settings', icon:'fa-sliders text-slate-500', req:'admin'}, {index:4, name:'Users', icon:'fa-users-gear text-rose-500', req:'admin'} ];
    const isAdmin = computed(() => currentUser.value && currentUser.value.role === 'Admin');
    const canManage = computed(() => currentUser.value && (currentUser.value.role === 'Admin' || currentUser.value.role === 'Manager'));
    const checkPermission = (req) => { if(req==='all') return true; if(req==='admin') return isAdmin.value; if(req==='manage') return canManage.value; return false; };
    const canPreview = (fileName) => { if(!fileName) return false; const ext = fileName.split('.').pop().toLowerCase(); const previewable = ['pdf', 'jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp']; return previewable.includes(ext); };
    const hasFilters = computed(() => searchTags.value.length>0 || searchQuery.value || selectedDepts.value.length>0 || selectedStatuses.value.length>0 || selectedDocTypes.value.length>0 || filterStartDate.value || filterEndDate.value);
    const searchSuggestions = computed(() => { if(!searchQuery.value) return []; const q = searchQuery.value.toLowerCase(); return employees.value.filter(e => (e.empId.toLowerCase().includes(q) || e.firstName.toLowerCase().includes(q)) && !searchTags.value.includes(e.empId)).slice(0, 5); });
    const selectSuggestion = (s) => { searchTags.value.push(s.empId); searchQuery.value = ''; };
    const addSearchTag = () => { if(searchQuery.value.trim()){ searchTags.value.push(searchQuery.value.trim()); searchQuery.value = ''; } };
    const removeTag = (idx) => { searchTags.value.splice(idx, 1); };
    const empSuggestions = computed(() => { if(!form.empId || !form.isNew) return []; const q = form.empId.toLowerCase(); return employees.value.filter(e => e.empId.toLowerCase().includes(q) || e.firstName.toLowerCase().includes(q) || e.lastName.toLowerCase().includes(q) ).slice(0, 5); });
    const handleEmpInput = () => { showEmpDropdown.value = true; };
